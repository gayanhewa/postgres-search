services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres-search-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: search
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d search"]
      interval: 2s
      timeout: 5s
      retries: 15

volumes:
  pgdata:
